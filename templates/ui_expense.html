<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Title</title>
</head>
<head>
  <meta charset="utf-8">
  <title>Expense Tracker</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">
<div class="container py-4">
  <h2 class="mb-4">💰 Expense Tracker</h2>

  <div class="row">
    <div class="col-md-4">
      <div class="card p-3 mb-3">
        <h5>Add Expense</h5>
        <form method="post" action="/add_expense">
          <input class="form-control mb-2" name="amount" placeholder="Amount" required>

          <select id="category" class="form-control mb-2" name="category_id">
            {% for c in categories %}
              <option value="{{c.id}}">{{c.name}}</option>
            {% endfor %}
          </select>

          <select id="subcategory" class="form-control mb-2" name="subcategory_id">
            {% for s in subcategories %}
              <option value="{{s.id}}">{{s.name}}</option>
            {% endfor %}
          </select>

          <select class="form-control mb-2" name="person_id">
            {% for p in persons %}
              <option value="{{p.id}}">{{p.name}}</option>
            {% endfor %}
          </select>

          <select class="form-control mb-2" name="payment_mode">
            <option>Cash</option>
            <option>Debit Card</option>
            <option>Credit Card</option>
          </select>

          <button class="btn btn-primary w-100">Add</button>
        </form>
      </div>

      <div class="card p-3 mb-3">
        <h6>Add Category</h6>
        <form method="post" action="/add_category">
          <input class="form-control mb-2" name="name" placeholder="Category name">
          <button class="btn btn-sm btn-success">Add</button>
        </form>

        <h6 class="mt-3">Add Subcategory</h6>
        <form method="post" action="/add_subcategory">
          <input class="form-control mb-2" name="name" placeholder="Subcategory">
          <select class="form-control mb-2" name="category_id">
            {% for c in categories %}
              <option value="{{c.id}}">{{c.name}}</option>
            {% endfor %}
          </select>
          <button class="btn btn-sm btn-success">Add</button>
        </form>

        <h6 class="mt-3">Add Person</h6>
        <form method="post" action="/add_person">
          <input class="form-control mb-2" name="name" placeholder="Person">
          <button class="btn btn-sm btn-success">Add</button>
        </form>
      </div>

      <div class="card p-3">
        <a href="/export/csv" class="btn btn-outline-secondary mb-2">Export CSV</a>
        <a href="/export/excel" class="btn btn-outline-secondary">Export Excel</a>
      </div>
    </div>

    <div class="col-md-8">
      <div class="card p-3">
        <h5>All Expenses</h5>
        <table class="table table-striped">
          <tr>
            <th>Date</th><th>Amount</th><th>Category</th><th>Subcategory</th><th>Person</th><th>Mode</th>
          </tr>
          {% for e in expenses %}
          <tr>
            <td>{{e.date}}</td>
            <td>{{e.amount}}</td>
            <td>{{e.category}}</td>
            <td>{{e.subcategory}}</td>
            <td>{{e.person}}</td>
            <td>{{e.payment_mode}}</td>
          </tr>
          {% endfor %}
        </table>
      </div>
    </div>
  </div>
</div>
</body>
</html>
<script>
document.getElementById("category").addEventListener("change", function() {
    let categoryId = this.value;

    fetch(`/api/subcategories/${categoryId}`)
        .then(res => res.json())
        .then(data => {
            let subDropdown = document.getElementById("subcategory");
            subDropdown.innerHTML = "";

            data.forEach(sub => {
                let option = document.createElement("option");
                option.value = sub.id;
                option.text = sub.name;
                subDropdown.appendChild(option);
            });
        });
});
</script>
